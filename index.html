<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether — Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated sky background -->
  <div class="sky-bg">
    <div class="sky-layer sky-layer--base"></div>
    <div class="sky-layer sky-layer--mid"></div>
    <div class="sky-layer sky-layer--top"></div>
    <div class="sun-orb"></div>
    <div class="clouds">
      <div class="cloud cloud--1"></div>
      <div class="cloud cloud--2"></div>
      <div class="cloud cloud--3"></div>
    </div>
  </div>

  <!-- Noise texture overlay -->
  <div class="noise-overlay"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          <circle cx="12" cy="12" r="4"/>
        </svg>
        <span class="brand-name">Aether</span>
      </div>

      <!-- Search -->
      <div class="search-wrapper">
        <div class="search-box" id="searchBox">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search city…" autocomplete="off" />
          <div class="search-dropdown" id="searchDropdown"></div>
        </div>
      </div>

      <div class="header-meta">
        <span class="header-date" id="headerDate"></span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <!-- Current Weather Hero -->
      <section class="hero-card glass-card" id="heroCard">
        <div class="hero-left">
          <div class="hero-location">
            <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            <span id="cityName">San Francisco</span>
          </div>
          <div class="hero-condition" id="heroCondition">Partly Cloudy</div>
          <div class="hero-temp-row">
            <span class="hero-temp" id="heroTemp">64</span>
            <span class="hero-degree">°F</span>
          </div>
          <div class="hero-range">
            <span class="hero-high">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
              <span id="heroHigh">68°</span>
            </span>
            <span class="hero-low">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
              <span id="heroLow">55°</span>
            </span>
          </div>
          <div class="hero-feels">Feels like <span id="heroFeels">62°F</span></div>
        </div>
        <div class="hero-right">
          <div class="weather-icon-large" id="heroIcon">
            <!-- Dynamic weather icon -->
          </div>
        </div>
      </section>

      <!-- Detail Cards -->
      <section class="details-grid">
        <div class="detail-card glass-card" data-metric="humidity">
          <div class="detail-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
            <span>Humidity</span>
          </div>
          <div class="detail-value" id="humidity">72<span class="detail-unit">%</span></div>
          <div class="detail-bar"><div class="detail-bar-fill" id="humidityBar" style="width:72%"></div></div>
          <div class="detail-note" id="humidityNote">Comfortable</div>
        </div>

        <div class="detail-card glass-card" data-metric="wind">
          <div class="detail-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.7 7.7A2.5 2.5 0 0 1 17 13H3"/><path d="M9.6 4.6A2 2 0 0 1 11 8H3"/><path d="M12.6 19.4A2 2 0 0 0 14 16H3"/>
            </svg>
            <span>Wind</span>
          </div>
          <div class="detail-value" id="wind">12<span class="detail-unit"> mph</span></div>
          <div class="wind-direction">
            <div class="wind-compass" id="windCompass">
              <div class="compass-arrow" id="compassArrow"></div>
              <span class="compass-n">N</span><span class="compass-e">E</span><span class="compass-s">S</span><span class="compass-w">W</span>
            </div>
          </div>
          <div class="detail-note" id="windNote">WNW · Gentle breeze</div>
        </div>

        <div class="detail-card glass-card" data-metric="uv">
          <div class="detail-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
            <span>UV Index</span>
          </div>
          <div class="detail-value" id="uv">5<span class="detail-unit"> mod</span></div>
          <div class="uv-scale">
            <div class="uv-gradient"></div>
            <div class="uv-marker" id="uvMarker" style="left:41.6%"></div>
          </div>
          <div class="detail-note" id="uvNote">Use sunscreen</div>
        </div>

        <div class="detail-card glass-card" data-metric="visibility">
          <div class="detail-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <span>Visibility</span>
          </div>
          <div class="detail-value" id="visibility">10<span class="detail-unit"> mi</span></div>
          <div class="visibility-rings">
            <div class="vis-ring vis-ring--1"></div>
            <div class="vis-ring vis-ring--2"></div>
            <div class="vis-ring vis-ring--3"></div>
            <div class="vis-dot"></div>
          </div>
          <div class="detail-note" id="visibilityNote">Crystal clear</div>
        </div>
      </section>

      <!-- 5-Day Forecast -->
      <section class="forecast-section glass-card">
        <h2 class="forecast-title">5-Day Forecast</h2>
        <div class="forecast-row" id="forecastRow">
          <!-- filled by JS -->
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
